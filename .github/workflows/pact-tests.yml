name: Pact Contract Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "pacts/**"
      - "sdk/**"
      - "django-backend/**"
      - ".github/workflows/pact-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "pacts/**"
      - "sdk/**"
      - "django-backend/**"
      - ".github/workflows/pact-tests.yml"

jobs:
  consumer-typescript:
    name: Consumer tests (TypeScript SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Run Pact consumer tests
        working-directory: sdk/typescript
        run: npm run test:pact

      - name: Upload generated pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts-typescript
          path: pacts/*.json

  consumer-python:
    name: Consumer tests (Python SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./sdk/python[dev]"

      - name: Run Pact consumer tests
        working-directory: sdk/python
        run: pytest tests/test_pact_consumer.py -v

      - name: Upload generated pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts-python
          path: pacts/*.json

  provider-verification:
    name: Producer verification (Django API)
    runs-on: ubuntu-latest
    needs: [consumer-typescript, consumer-python]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_soroscan
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Download TypeScript pact artifacts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts-typescript
          path: pacts

      - name: Download Python pact artifacts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts-python
          path: pacts

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: django-backend/requirements.txt

      - name: Install backend dependencies
        working-directory: django-backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify provider against pact contracts
        working-directory: django-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_soroscan
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "False"
          DJANGO_SETTINGS_MODULE: soroscan.settings_test
          CELERY_TASK_ALWAYS_EAGER: "True"
          PACT_PROVIDER_STATES_ENABLED: "1"
        run: |
          python -m pytest soroscan/pact_tests/test_provider_verification.py -v

      - name: Run v1 API unit tests
        working-directory: django-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_soroscan
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "False"
          DJANGO_SETTINGS_MODULE: soroscan.settings_test
          CELERY_TASK_ALWAYS_EAGER: "True"
        run: |
          python -m pytest soroscan/pact_tests/test_v1_views.py -v
